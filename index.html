<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Word Grid Game</title>
<style>
  :root {
    --bg-dark: #1e1e2e;
    --bg-panel: #282a36;
    --btn-fill: #44475a;
    --btn-selected: #bd93f9;
    --btn-outline: #6272a4;
    --text-light: #f8f8f2;
    --line-color: #ff79c6;
    --score-color: #50fa7b;
    --timer-color: #ffb86c;
    --word-color: #8be9fd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 14px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  #menu, #username-screen {
    background: var(--bg-panel);
    width: min(450px, 100%);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  #menu p { opacity: 0.85; font-size: 0.95rem; text-align: center; }
  #top {
    background: var(--bg-panel);
    width: min(450px, 100%);
    border-radius: 12px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    align-items: center;
  }
  #mode-label { grid-column: 1 / 3; text-align: center; font-size: 0.85rem; opacity: 0.75; }
  #score  { color: var(--score-color); font-weight: 600; font-size: 1.1rem; }
  #timer  { color: var(--timer-color); font-weight: 600; font-size: 1.1rem; text-align: right; }
  #word   { grid-column: 1 / 3; color: var(--word-color); font-size: 1.15rem; min-height: 1.4em; text-align: center; }
  #board {
    position: relative;
    width: min(450px, 100vw - 32px);
    aspect-ratio: 1;
    touch-action: none;
    margin: 0 auto;
  }
  svg { width: 100%; height: 100%; display: block; }
  .cell-rect { fill: var(--btn-fill); stroke: var(--btn-outline); stroke-width: 2; transition: fill 0.1s; }
  .cell-rect.selected { fill: var(--btn-selected); }
  .cell-letter { fill: var(--text-light); font-weight: bold; font-size: 38px; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
  .cell-points { fill: var(--timer-color); font-weight: bold; font-size: 13px; text-anchor: end; pointer-events: none; }
  .drag-line { stroke: var(--line-color); stroke-width: 5; stroke-linecap: round; fill: none; pointer-events: none; }
  button.action, button.primary, button.secondary {
    border: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary { background: var(--btn-selected); color: var(--bg-dark); width: 100%; }
  button.secondary { background: var(--btn-fill); color: var(--text-light); width: 100%; }
  button.action { background: var(--btn-selected); color: var(--bg-dark); }
  button.primary:hover, button.action:hover { background: var(--line-color); color: var(--text-light); }
  button.secondary:hover { background: var(--btn-outline); }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid var(--btn-outline);
    background: var(--btn-fill);
    color: var(--text-light);
    font-size: 1rem;
    font-family: inherit;
  }
  input[type="text"]:focus { outline: none; border-color: var(--btn-selected); }
  label { font-size: 0.9rem; opacity: 0.85; align-self: flex-start; }
  #words-panel, #leaderboard-panel {
    display: none;
    width: min(450px, 100%);
    background: var(--bg-panel);
    border-radius: 12px;
    padding: 14px;
  }
  #words-panel h3, #leaderboard-panel h3 { color: var(--word-color); margin-bottom: 10px; font-family: inherit; }
  .word-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 10px;
    padding: 4px 4px;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(98, 114, 164, 0.2);
  }
  .word-row .mark { text-align: center; }
  .word-row .pts { opacity: 0.75; font-variant-numeric: tabular-nums; }
  .hit  { color: var(--score-color); }
  .miss { color: var(--text-light); opacity: 0.75; }
  .lb-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 10px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--btn-fill);
    font-size: 0.95rem;
  }
  .lb-row.me { background: rgba(189, 147, 249, 0.15); border-radius: 4px; padding: 6px 8px; }
  .lb-rank { opacity: 0.65; }
  .lb-score { color: var(--score-color); font-weight: 600; font-variant-numeric: tabular-nums; }
  details.panel-collapse { width: min(450px, 100%); }
  details.panel-collapse > summary {
    background: var(--bg-panel);
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--word-color);
    font-weight: 600;
    list-style: none;
  }
  details.panel-collapse > summary::-webkit-details-marker { display: none; }
  details.panel-collapse[open] > summary { border-radius: 8px 8px 0 0; }
  #status-msg { opacity: 0.8; font-size: 0.9rem; text-align: center; min-height: 1.2em; }
</style>
</head>
<body>
  <h1>Word Grid Game</h1>

  <div id="menu">
    <button id="btn-daily" class="primary">Daily Challenge</button>
    <button id="btn-practice" class="secondary">Practice (random)</button>
    <p id="menu-hint">Daily = same board for everyone, once per day.<br>Practice = fresh random board every time.</p>
  </div>

  <div id="username-screen" hidden>
    <label for="username-input">Pick a username (1-20 chars)</label>
    <input id="username-input" type="text" maxlength="20" autocomplete="off" placeholder="e.g. reece">
    <button id="btn-save-username" class="primary">Start Daily</button>
    <button id="btn-cancel-username" class="secondary">Back</button>
  </div>

  <div id="top" hidden>
    <span id="mode-label"></span>
    <span id="score">Score: 0</span>
    <span id="timer">Time: 60</span>
    <span id="word"></span>
  </div>
  <div id="board" hidden>
    <svg id="svg" viewBox="0 0 450 450" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <button id="action-btn" class="action" hidden>New Game</button>
  <button id="back-btn" class="secondary" hidden style="width:min(450px,100%)">Back to Menu</button>
  <div id="status-msg"></div>
  <div id="leaderboard-panel"></div>
  <div id="words-panel"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getFirestore, collection, addDoc, query, where, limit, getDocs, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

// ==== FIREBASE CONFIG — paste your own from the Firebase console ====
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDYZazZxmLxgyIfxOOTPKel26gTq-gmAHk",
  authDomain: "word-grid-game-e7e1f.firebaseapp.com",
  projectId: "word-grid-game-e7e1f",
  storageBucket: "word-grid-game-e7e1f.firebasestorage.app",
  messagingSenderId: "323227834769",
  appId: "1:323227834769:web:b114a56cc73a226d716230"
};
const FIREBASE_ENABLED = FIREBASE_CONFIG.apiKey !== "REPLACE_ME";

let db = null;
if (FIREBASE_ENABLED) {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(app);
}

// ==== Game constants ====
const GRID_SIZE = 4;
const TIME_LIMIT = 60;
const MIN_WORD_LENGTH = 3;
const MAX_LETTER_COUNT = 2;
const MIN_VOWELS = 5;
const MAX_VOWELS = 7;
const VOWELS = new Set(['A','E','I','O','U']);

const LETTER_POINTS = (() => {
  const p = {};
  for (const ch of "AEIOULNSTR") p[ch] = 1;
  for (const ch of "DG") p[ch] = 2;
  for (const ch of "BCMP") p[ch] = 3;
  for (const ch of "FHVWY") p[ch] = 4;
  p["K"] = 5;
  for (const ch of "JX") p[ch] = 8;
  for (const ch of "QZ") p[ch] = 10;
  return p;
})();

const LETTER_WEIGHTS = {
  E:13, A:10, I:9, O:8, U:4,
  R:8, T:8, N:7, S:7, L:6,
  D:5, H:5, G:4, C:4, M:4,
  B:3, P:3, F:3, Y:3, W:3,
  K:2, V:2, X:1, Z:1, J:1, Q:1,
};

const BUTTON_SIZE = 85;
const BUTTON_SPACING = 20;
const CORNER_RADIUS = 16;
// Center the grid within the 450x450 SVG viewBox
const MARGIN = (450 - (GRID_SIZE * BUTTON_SIZE + (GRID_SIZE - 1) * BUTTON_SPACING)) / 2;

const SVG_NS = "http://www.w3.org/2000/svg";
const $ = id => document.getElementById(id);

// ==== Seeded PRNG (mulberry32) + string hash for date → seed ====
function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 16777619);
  }
  return h >>> 0;
}
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function dailyKey() {
  const d = new Date();
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

// ==== Game state ====
let dictionary = new Set();
let prefixes = new Set();
let letters = [];
let cellRects = [];
let cellPositions = [];
let selected = [];
let lineEls = [];
let score = 0;
let timeLeft = TIME_LIMIT;
let timerId = null;
let gameOver = false;
let usedWords = new Set();
let dragging = false;
let mode = null;       // 'daily' or 'practice'
let username = localStorage.getItem('wg_username') || '';

// ==== Element refs ====
const menuEl = $('menu'), usernameScreen = $('username-screen'), topEl = $('top'),
      boardEl = $('board'), svg = $('svg'), actionBtn = $('action-btn'),
      backBtn = $('back-btn'), wordsPanel = $('words-panel'),
      leaderboardPanel = $('leaderboard-panel'), statusMsg = $('status-msg'),
      scoreEl = $('score'), timerEl = $('timer'), wordEl = $('word'),
      modeLabel = $('mode-label');

// ==== Letter generation (accepts RNG so daily can be seeded) ====
function weightedPick(pool, rng) {
  const keys = Object.keys(pool);
  const total = keys.reduce((s, k) => s + pool[k], 0);
  let r = rng() * total;
  for (const k of keys) {
    r -= pool[k];
    if (r <= 0) return k;
  }
  return keys[keys.length - 1];
}

function sampleBalancedLetters(total, rng) {
  const vowelTarget = MIN_VOWELS + Math.floor(rng() * (MAX_VOWELS - MIN_VOWELS + 1));
  const consonantTarget = total - vowelTarget;
  const vowelPool = {}, consonantPool = {};
  for (const [k, v] of Object.entries(LETTER_WEIGHTS)) {
    if (VOWELS.has(k)) vowelPool[k] = v;
    else consonantPool[k] = v;
  }
  const counts = {};
  const picked = [];
  const draw = pool => {
    const available = {};
    for (const [k, v] of Object.entries(pool)) {
      if ((counts[k] || 0) < MAX_LETTER_COUNT) available[k] = v;
    }
    const source = Object.keys(available).length ? available : pool;
    return weightedPick(source, rng);
  };
  for (let i = 0; i < vowelTarget; i++) {
    const l = draw(vowelPool);
    counts[l] = (counts[l] || 0) + 1;
    picked.push(l);
  }
  for (let i = 0; i < consonantTarget; i++) {
    const l = draw(consonantPool);
    counts[l] = (counts[l] || 0) + 1;
    picked.push(l);
  }
  for (let i = picked.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [picked[i], picked[j]] = [picked[j], picked[i]];
  }
  return picked;
}

function el(name, attrs = {}) {
  const e = document.createElementNS(SVG_NS, name);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function generateGrid(rng) {
  svg.innerHTML = '';
  letters = [];
  cellRects = [];
  cellPositions = [];
  lineEls = [];
  const flat = sampleBalancedLetters(GRID_SIZE * GRID_SIZE, rng);
  let idx = 0;
  for (let r = 0; r < GRID_SIZE; r++) {
    const letterRow = [], rectRow = [], posRow = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      const letter = flat[idx++];
      const x = MARGIN + c * (BUTTON_SIZE + BUTTON_SPACING);
      const y = MARGIN + r * (BUTTON_SIZE + BUTTON_SPACING);
      const rect = el('rect', {
        x, y, width: BUTTON_SIZE, height: BUTTON_SIZE,
        rx: CORNER_RADIUS, ry: CORNER_RADIUS, class: 'cell-rect'
      });
      svg.appendChild(rect);
      const txt = el('text', {
        x: x + BUTTON_SIZE / 2, y: y + BUTTON_SIZE / 2, class: 'cell-letter'
      });
      txt.textContent = letter;
      svg.appendChild(txt);
      const pts = el('text', {
        x: x + BUTTON_SIZE - 6, y: y + BUTTON_SIZE - 6, class: 'cell-points'
      });
      pts.textContent = String(LETTER_POINTS[letter]);
      svg.appendChild(pts);
      letterRow.push(letter);
      rectRow.push(rect);
      posRow.push({ x, y, cx: x + BUTTON_SIZE / 2, cy: y + BUTTON_SIZE / 2 });
    }
    letters.push(letterRow);
    cellRects.push(rectRow);
    cellPositions.push(posRow);
  }
}

// ==== Selection / input ====
function svgPoint(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (clientX - rect.left) * (vb.width / rect.width),
    y: (clientY - rect.top) * (vb.height / rect.height),
  };
}
function cellAt(x, y) {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const p = cellPositions[r][c];
      if (x > p.x && x < p.x + BUTTON_SIZE && y > p.y && y < p.y + BUTTON_SIZE) return [r, c];
    }
  }
  return null;
}
function isSelected(r, c) { return selected.some(([rr, cc]) => rr === r && cc === c); }

function addLetter(r, c) {
  if (isSelected(r, c)) return;
  if (selected.length) {
    const [lr, lc] = selected[selected.length - 1];
    if (Math.abs(r - lr) > 1 || Math.abs(c - lc) > 1) return;
  }
  selected.push([r, c]);
  cellRects[r][c].classList.add('selected');
  if (selected.length > 1) {
    const a = cellPositions[selected[selected.length - 2][0]][selected[selected.length - 2][1]];
    const b = cellPositions[r][c];
    const line = el('line', { x1: a.cx, y1: a.cy, x2: b.cx, y2: b.cy, class: 'drag-line' });
    svg.appendChild(line);
    lineEls.push(line);
  }
  wordEl.textContent = selected.map(([rr, cc]) => letters[rr][cc]).join('');
}

function clearSelection() {
  for (const [r, c] of selected) cellRects[r][c].classList.remove('selected');
  for (const l of lineEls) l.remove();
  selected = [];
  lineEls = [];
}

function handleStart(clientX, clientY) {
  if (gameOver) return;
  clearSelection();
  const p = svgPoint(clientX, clientY);
  const hit = cellAt(p.x, p.y);
  if (!hit) return;
  dragging = true;
  addLetter(hit[0], hit[1]);
}
function handleMove(clientX, clientY) {
  if (!dragging || gameOver) return;
  const p = svgPoint(clientX, clientY);
  const hit = cellAt(p.x, p.y);
  if (hit) addLetter(hit[0], hit[1]);
}
function handleEnd() {
  if (!dragging) return;
  dragging = false;
  if (gameOver || !selected.length) return;
  const word = selected.map(([r, c]) => letters[r][c]).join('').toLowerCase();
  if (usedWords.has(word)) {
    wordEl.textContent = `⚠️ ${word} already used`;
  } else if (word.length >= MIN_WORD_LENGTH && dictionary.has(word)) {
    usedWords.add(word);
    let pts = 0;
    for (const ch of word) pts += LETTER_POINTS[ch.toUpperCase()];
    score += pts;
    scoreEl.textContent = `Score: ${score}`;
    wordEl.textContent = `✅ ${word} +${pts} pts`;
  } else {
    wordEl.textContent = `❌ ${word} not valid`;
  }
  clearSelection();
}

svg.addEventListener('mousedown', e => { e.preventDefault(); handleStart(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
window.addEventListener('mouseup', handleEnd);
svg.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; handleStart(t.clientX, t.clientY); }, { passive: false });
svg.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }, { passive: false });
svg.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); }, { passive: false });

// ==== Timer / end of game ====
function startTimer() {
  clearInterval(timerId);
  timeLeft = TIME_LIMIT;
  timerEl.textContent = `Time: ${timeLeft}`;
  timerId = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(timerId);
      timerEl.textContent = "Time's up!";
      wordEl.textContent = "Game Over!";
      gameOver = true;
      onGameOver();
    } else {
      timerEl.textContent = `Time: ${timeLeft}`;
    }
  }, 1000);
}

function showPossibleWords() {
  const found = new Set();
  const grid = letters.map(row => row.map(ch => ch.toLowerCase()));
  const visited = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));
  function dfs(r, c, word) {
    if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE || visited[r][c]) return;
    const nw = word + grid[r][c];
    if (!prefixes.has(nw)) return;
    if (nw.length >= MIN_WORD_LENGTH && dictionary.has(nw)) found.add(nw);
    visited[r][c] = true;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr || dc) dfs(r + dr, c + dc, nw);
    visited[r][c] = false;
  }
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++) dfs(r, c, "");

  const scored = [...found].map(w => {
    let p = 0;
    for (const ch of w) p += LETTER_POINTS[ch.toUpperCase()];
    return [w, p];
  }).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

  const hits = scored.filter(([w]) => usedWords.has(w)).length;
  let html = `<h3>${hits}/${scored.length} words found — score ${score}</h3>`;
  if (!scored.length) {
    html += '<p>No valid words found.</p>';
  } else {
    for (const [w, p] of scored) {
      const got = usedWords.has(w);
      const cls = got ? 'hit' : 'miss';
      const mark = got ? '✓' : '';
      html += `<div class="word-row ${cls}"><span class="mark">${mark}</span><span>${escapeHtml(w)}</span><span class="pts">${p} pts</span></div>`;
    }
  }
  wordsPanel.innerHTML = html;
  wordsPanel.style.display = 'block';
}

async function onGameOver() {
  showPossibleWords();
  if (mode === 'daily') {
    await submitDailyScore();
    await showLeaderboard();
  }
  actionBtn.textContent = mode === 'daily' ? 'Done' : 'New Game';
}

// ==== Firebase scoreboard ====
async function submitDailyScore() {
  if (!FIREBASE_ENABLED || !db) {
    statusMsg.textContent = 'Scoreboard not configured yet.';
    return;
  }
  const date = dailyKey();
  const submittedKey = `wg_submitted_${date}`;
  if (localStorage.getItem(submittedKey)) {
    statusMsg.textContent = 'Already submitted today. Come back tomorrow!';
    return;
  }
  try {
    await addDoc(collection(db, 'scores'), {
      username: username.slice(0, 20),
      score: Math.max(0, Math.min(500, score | 0)),
      date,
      ts: serverTimestamp(),
    });
    localStorage.setItem(submittedKey, String(score));
    statusMsg.textContent = 'Score submitted!';
  } catch (err) {
    console.error(err);
    statusMsg.textContent = 'Could not submit score (check Firestore rules).';
  }
}

async function showLeaderboard() {
  if (!FIREBASE_ENABLED || !db) return;
  const date = dailyKey();
  leaderboardPanel.innerHTML = `<h3>Today's Leaderboard (${date})</h3><p>Loading…</p>`;
  leaderboardPanel.style.display = 'block';
  try {
    const q = query(
      collection(db, 'scores'),
      where('date', '==', date),
      limit(200),
    );
    const snap = await getDocs(q);
    let html = `<h3>Today's Leaderboard (${date})</h3>`;
    if (snap.empty) {
      html += '<p>No scores yet — you could be the first!</p>';
    } else {
      const rows = snap.docs.map(d => d.data())
        .sort((a, b) => b.score - a.score)
        .slice(0, 20);
      let rank = 1;
      for (const d of rows) {
        const mine = d.username === username;
        html += `<div class="lb-row ${mine ? 'me' : ''}">
          <span class="lb-rank">#${rank}</span>
          <span>${escapeHtml(d.username)}</span>
          <span class="lb-score">${d.score}</span>
        </div>`;
        rank++;
      }
    }
    leaderboardPanel.innerHTML = html;
  } catch (err) {
    console.error(err);
    leaderboardPanel.innerHTML = `<h3>Leaderboard</h3><p>Couldn't load (check Firestore rules).</p>`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ==== Game lifecycle / mode handling ====
function showMenu() {
  mode = null;
  gameOver = true;
  clearInterval(timerId);
  clearSelection();
  menuEl.hidden = false;
  usernameScreen.hidden = true;
  topEl.hidden = true;
  boardEl.hidden = true;
  actionBtn.hidden = true;
  backBtn.hidden = true;
  wordsPanel.style.display = 'none';
  leaderboardPanel.style.display = 'none';
  statusMsg.textContent = '';
}

function startGame(selectedMode) {
  mode = selectedMode;
  menuEl.hidden = true;
  usernameScreen.hidden = true;
  topEl.hidden = false;
  boardEl.hidden = false;
  actionBtn.hidden = false;
  backBtn.hidden = false;
  wordsPanel.style.display = 'none';
  leaderboardPanel.style.display = 'none';
  statusMsg.textContent = '';

  score = 0;
  scoreEl.textContent = 'Score: 0';
  wordEl.textContent = '';
  usedWords = new Set();
  gameOver = false;
  clearSelection();

  let rng;
  if (mode === 'daily') {
    const date = dailyKey();
    modeLabel.textContent = `Daily Challenge — ${date} · ${username}`;
    rng = mulberry32(hashString('wordgrid-' + date));
    actionBtn.textContent = 'Restart (practice mode)';
  } else {
    modeLabel.textContent = 'Practice';
    rng = Math.random;
    actionBtn.textContent = 'Restart';
  }
  generateGrid(rng);
  startTimer();
}

$('btn-practice').addEventListener('click', () => startGame('practice'));

$('btn-daily').addEventListener('click', () => {
  if (!FIREBASE_ENABLED) {
    statusMsg.textContent = 'Daily mode needs Firebase configured. Playing solo daily.';
  }
  if (!username) {
    menuEl.hidden = true;
    usernameScreen.hidden = false;
    $('username-input').focus();
  } else {
    startGame('daily');
  }
});

$('btn-save-username').addEventListener('click', () => {
  const v = $('username-input').value.trim();
  if (!v) return;
  username = v.slice(0, 20);
  localStorage.setItem('wg_username', username);
  startGame('daily');
});
$('btn-cancel-username').addEventListener('click', showMenu);
$('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-save-username').click(); });

actionBtn.addEventListener('click', () => {
  // In daily mode, restart becomes a practice round (so people can't farm daily).
  if (mode === 'daily') startGame('practice');
  else startGame('practice');
});
backBtn.addEventListener('click', showMenu);

// ==== Dictionary load ====
async function loadDictionary() {
  try {
    const resp = await fetch('words_alpha.txt');
    if (!resp.ok) throw new Error(resp.statusText);
    const text = await resp.text();
    dictionary = new Set(text.split(/\r?\n/).map(w => w.trim().toLowerCase()).filter(Boolean));
    prefixes = new Set();
    for (const w of dictionary) {
      for (let i = 1; i <= w.length; i++) prefixes.add(w.slice(0, i));
    }
  } catch (err) {
    statusMsg.textContent = 'Failed to load words_alpha.txt. Serve via HTTP (not file://).';
  }
}

loadDictionary().then(showMenu);
</script>
